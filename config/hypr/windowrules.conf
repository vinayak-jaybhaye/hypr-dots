##############################
### WINDOW RULES #############
##############################
# Window rules control per-window behavior (float, size, workspace, opacity, etc.).
# This file is currently empty — rules are added here as needed.
#
# Syntax:
#   windowrule = <rule> [value], match:<criteria> <regex>
#
# Common match criteria:
#   match:class <regex>         — match window class (use hyprctl clients to find)
#   match:title <regex>         — match window title
#   match:initial_class <regex> — match initial window class
#
# Common rules:
#   float 1                     — make window floating (requires value 1)
#   size <W> <H>                — set window size
#   move <X> <Y>                — set window position
#   workspace <N>               — assign to workspace
#   opacity <active> <inactive> — set opacity
#   suppressevent maximize       — prevent maximize requests
#
# Example:
#   windowrule = float 1, match:class ^(pavucontrol)$
#   windowrule = size 800 600, match:class ^(pavucontrol)$
#   windowrule = workspace 2, match:class ^(firefox)$
#
# See: https://wiki.hypr.land/Configuring/Window-Rules/

# Float specific settings/dialog windows to protect tiling layout
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = size 800 600, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = size 800 500, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = size 700 500, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(file-roller)$
windowrule = float 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float 1, match:class ^(wlogout)$