# #######################################################################################
# HYPRIDLE — Idle timeout manager
# #######################################################################################
# Manages automatic actions after user inactivity.
# Listeners trigger in sequence based on timeout values.
# All timeouts are in seconds.
# #######################################################################################

general {
  lock_cmd = hyprlock
}

# Lock screen after 10 minutes of inactivity
listener {
  timeout = 600        # 10 min
  on-timeout = hyprlock
}

# Turn off display and keyboard backlight after 11 minutes
listener {
  timeout = 660        # 11 min (1 min after lock)
  on-timeout = hyprctl dispatch dpms off && brightnessctl -d platform::kbd_backlight set 0
  on-resume = hyprctl dispatch dpms on
}

# Suspend system after 11 minutes
# NOTE: Same timeout as DPMS off — both trigger together.
# Increase this value to delay suspend after screen-off.
listener {
  timeout = 660        # 11 min
  on-timeout = systemctl suspend
}

