# #######################################################################################
# HYPRSUNSET — Blue light filter / night mode
# #######################################################################################
# hyprsunset is started at login via exec.conf and runs continuously.
# It can be toggled on/off at runtime via:
#   - Keybind (see keybinds.conf)
#   - Waybar click (see waybar modules/custom.jsonc)
# The toggle/status scripts are in scripts/hyprsunset-toggle.sh and scripts/hyprsunset-status.sh
# Waybar signal: RTMIN+2
# #######################################################################################

# max-gamma = 150
#
# # Morning / Day mode
# profile {
#     time = 07:30
#     identity = true
# }

# Evening / Night mode
profile {
    time = 21:00
    temperature = 3000
    gamma = 0.85
}

