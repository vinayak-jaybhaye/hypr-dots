# #######################################################################################
# KEYBINDINGS
# #######################################################################################
# All keyboard shortcuts are defined here. Uses $terminal, $menu, $fileManager
# variables from hyprland.conf (which sources this file).
#
# SUBMAP WARNING: This file contains two submaps (opacity, mouse). Submaps capture
# ALL input until explicitly exited. If a submap is entered but never exited (e.g.
# missing "submap = reset"), ALL keybinds will stop working. Always ensure every
# submap has an escape/exit binding that resets to the default submap.
#
# Bind types used:
#   bind   = standard keybind
#   binde  = repeats while held (resize)
#   bindl  = works even when locked/input inhibited
#   bindel = repeats + locked (volume/brightness)
#   bindm  = mouse bind
# #######################################################################################

########################
### MODIFIER ###########
########################
$mainMod = SUPER


########################
### LAUNCHERS ##########
########################
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, escape, exec, hyprlock


########################
### WINDOW ACTIONS #####
########################
bind = $mainMod, C, killactive
bind = $mainMod, F, fullscreen, 2            # window only
bind = $mainMod SHIFT, F, fullscreen, 1      # monitor
bind = $mainMod SHIFT, C, togglefloating
bind = $mainMod SHIFT, Q, exit

########################
### LAYOUT #############
########################

# Window behavior
bind = $mainMod, P, pseudo
bind = $mainMod, S, layoutmsg, togglesplit

# Toggle master - dwindle layout
# NOTE: SUPER+M is also bound to the mouse submap below (line ~180).
# The submap binding (later in file) takes precedence, so SUPER+M enters
# mouse mode, NOT master layout. To switch to master, use hyprctl directly.
bind = $mainMod, M, exec, hyprctl keyword general:layout master
bind = $mainMod, D, exec, hyprctl keyword general:layout dwindle


########################
### FOCUS MOVEMENT #####
########################
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d


########################
### WINDOW MOVEMENT ####
########################
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


########################
### RESIZE #############
########################
bind = $mainMod CTRL, H, resizeactive, -20 0
bind = $mainMod CTRL, L, resizeactive, 20 0
bind = $mainMod CTRL, K, resizeactive, 0 -20
bind = $mainMod CTRL, J, resizeactive, 0 20


########################
### WINDOW OPACITY #####
########################
# SUBMAP: opacity — SUPER+O enters, press 0-9 to set opacity, ESC to cancel.
# Each key sets opacity and immediately resets the submap (returns to normal).
bind = $mainMod, O, submap, opacity
submap = opacity
bind = , 1, exec, hyprctl dispatch setprop active opacity 0.1; hyprctl dispatch submap reset
bind = , 2, exec, hyprctl dispatch setprop active opacity 0.2; hyprctl dispatch submap reset
bind = , 3, exec, hyprctl dispatch setprop active opacity 0.3; hyprctl dispatch submap reset
bind = , 4, exec, hyprctl dispatch setprop active opacity 0.4; hyprctl dispatch submap reset
bind = , 5, exec, hyprctl dispatch setprop active opacity 0.5; hyprctl dispatch submap reset
bind = , 6, exec, hyprctl dispatch setprop active opacity 0.6; hyprctl dispatch submap reset
bind = , 7, exec, hyprctl dispatch setprop active opacity 0.7; hyprctl dispatch submap reset
bind = , 8, exec, hyprctl dispatch setprop active opacity 0.8; hyprctl dispatch submap reset
bind = , 9, exec, hyprctl dispatch setprop active opacity 0.9; hyprctl dispatch submap reset
bind = , 0, exec, hyprctl dispatch setprop active opacity 1.0; hyprctl dispatch submap reset
# ESC to cancel without changing
bind = , escape, submap, reset
submap = reset

########################
### WORKSPACES #########
########################
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


########################
### SPECIAL WORKSPACE ##
########################

# Scratchpad (special workspace)
bind = $mainMod, grave, togglespecialworkspace, scratch
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratch
bind = $mainMod CTRL, grave, movetoworkspace, previous 

########################
### CLIPBOARD ##########
########################
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist wipe


########################
### SCREENSHOTS ########
########################
# Full screen → save + notify
bind = , Print, exec, sh -c 'file=~/Pictures/screenshot-$(date +%F-%T).png && grim "$file" && notify-send "Screenshot saved" "$file"'

# Region → save + copy + notify
bind = $mainMod, Print, exec, sh -c 'file=~/Pictures/screenshot-$(date +%F-%T).png && grim -g "$(slurp)" "$file" && wl-copy < "$file" && notify-send "Screenshot saved & copied" "$file"'

# Region → clipboard only + notify
bind = $mainMod SHIFT, Print, exec, sh -c 'grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copied to clipboard"'


########################
### MOUSE ##############
########################
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


########################
### MEDIA / SYSTEM #####
########################
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


########################
### CUSTOM #############
########################
bind = $mainMod, W, exec, ~/hypr-dots/scripts/toggle-livewall.sh


# Window Groups - group multiple windows into one container
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, G, moveoutofgroup

# SUBMAP: mouse — keyboard-driven cursor control via ydotool.
# Requires: ydotool (not in pkglist.txt, install separately).
# Requires: ydotoold systemd service running (systemctl --user enable --now ydotool).
# SUPER+M enters mouse mode. All keys below work ONLY inside this submap.
# Press ESC to exit back to normal keybinds.
bind = $mainMod, M, submap, mouse

submap = mouse

# Movement
bind = , h, exec, ydotool mousemove -- -20 0
bind = , l, exec, ydotool mousemove -- 20 0
bind = , k, exec, ydotool mousemove -- 0 -20
bind = , j, exec, ydotool mousemove -- 0 20

# Faster movement
bind = SHIFT, h, exec, ydotool mousemove -- -100 0
bind = SHIFT, l, exec, ydotool mousemove -- 100 0
bind = SHIFT, k, exec, ydotool mousemove -- 0 -100
bind = SHIFT, j, exec, ydotool mousemove -- 0 100

# Clicks (ydotool click codes)
bind = , space, exec, ydotool click 0xC0     # left click
bind = , Return, exec, ydotool click 0xC1   # right click

# Drag (vim-style)
bind = , v, exec, ydotool click 0x40   # press
bind = , y, exec, ydotool click 0x80   # release

# Vertical scroll
bind = , u, exec, ydotool mousemove -w -- 0 2
bind = , d, exec, ydotool mousemove -w -- 0 -2

# Horizontal scroll
bind = , left,  exec, ydotool mousemove -w -- -1 0
bind = , right, exec, ydotool mousemove -w -- 1 0

# Fast scroll
bind = , up, exec, ydotool mousemove -w -- 0 8
bind = , down, exec, ydotool mousemove -w -- 0 -8

# Exit
bind = , escape, submap, reset

submap = reset
