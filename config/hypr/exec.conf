# #######################################################################################
# AUTOSTART — exec-once commands run once at Hyprland session start.
# #######################################################################################
# These are NOT re-run on config reload (hyprctl reload). Only on fresh login.
# To add a new startup app, add an exec-once line below.
# To run something on every reload, use exec (without -once) instead.
# #######################################################################################

#################
### AUTOSTART ###
#################

# System tray applets
exec-once = nm-applet                 # NetworkManager tray icon (requires network-manager-applet)
exec-once = blueman-applet            # Bluetooth tray icon (requires blueman)

# Status bar
exec-once = waybar

# Night mode — starts enabled by default; toggle with SUPER+hyprsunset keybind
exec-once = hyprsunset

# Authentication agent — required for GUI apps that need root privileges (e.g. package managers)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Clipboard history — watches for text and image copies, stores for later recall (SUPER+V)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle manager — handles screen lock, DPMS off, and suspend after inactivity
exec-once = hypridle

# Wallpaper — wpaperd rotates wallpapers from ~/Pictures/wallpapers/ every 10min
# hyprpaper is disabled (see docs/decisions/0005-wpaperd-over-hyprpaper.md)
# exec-once = hyprpaper
exec-once = wpaperd
