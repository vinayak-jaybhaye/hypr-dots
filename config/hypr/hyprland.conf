# #######################################################################################
# HYPRLAND ROOT CONFIG
# #######################################################################################
# This is the main Hyprland configuration entry point.
# Variables ($terminal, $menu, etc.) are defined here BEFORE the source directives
# at the bottom, so that sourced files (keybinds.conf, exec.conf) can reference them.
#
# Source order: This file loads first, then sources exec.conf, keybinds.conf, and
# windowrules.conf at the bottom. Moving source directives above variable definitions
# will break keybind references.
#
# See also: docs/architecture.md for the full config hierarchy.
# #######################################################################################

autogenerated = 0

################
### MONITORS ###
################
# See https://wiki.hypr.land/Configuring/Monitors/
# CAUTION: Monitor name "eDP-1" is hardcoded here and in:
#   - config/wpaperd/config.toml
#   - scripts/livewall.sh
# If the monitor name changes, update all three locations.
# Uncomment the line below for auto-detect instead:
# monitor=,preferred,auto,1
monitor=eDP-1,1920x1080@60,0x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    # Border gradient: Catppuccin Mauve → Blue at 45°
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(313244aa)
    resize_on_border = false
    allow_tearing = false
    # Default layout. Can be toggled at runtime via SUPER+M (master) / SUPER+D (dwindle)
    layout = master 
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.90
    dim_inactive = true
    dim_strength = 0.12

    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = rgba(11111b66)
        color_inactive = rgba(11111b22)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        vibrancy = 0.1696
    }
}


# https://wiki.hypr.land/Configuring/Variables/#animations
# Bezier format: name, x1, y1, x2, y2 (CSS cubic-bezier control points)
# Animation format: name, enabled(0/1), speed, bezier[, style]
animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1, 0.32, 1      # Smooth deceleration
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1    # Balanced ease
    bezier = linear,         0, 0, 1, 1              # Constant speed
    bezier = almostLinear,   0.5, 0.5, 0.75, 1       # Slight ease-out
    bezier = quick,          0.15, 0, 0.1, 1         # Fast start

    animation = global,        1, 10, default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear, popin 87%
    animation = fade,          1, 3.03, quick
    animation = workspaces,    1, 1.94, almostLinear, fade
}


# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
   preserve_split = true
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers (default = -1)
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 0.7
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace


#########################
### SOURCE OTHER FILES ##
#########################
# IMPORTANT: These MUST remain at the bottom of this file.
# Sourced files reference variables ($terminal, $menu, etc.) defined above.
# Order between sourced files does not matter — they don't depend on each other.
source = ~/hypr-dots/config/hypr/exec.conf
source = ~/hypr-dots/config/hypr/keybinds.conf
source = ~/hypr-dots/config/hypr/windowrules.conf
